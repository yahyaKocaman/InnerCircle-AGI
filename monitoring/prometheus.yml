global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: innercircle-agi

scrape_configs:
  - job_name: innercircle-api
    static_configs:
      - targets:
          - "host.docker.internal:8000"
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
